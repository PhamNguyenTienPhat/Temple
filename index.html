<!DOCTYPE html>
<html lang="vi">
<head><script>window.onerror = function(msg, url, lineNo, columnNo, error) { alert(" Error: \ + msg + \\nLine: \ + lineNo); return false; };</script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#1a0a00" />
  <title>Đi Chùa Tại Nhà</title>
  <meta name="description" content="Trải Nghiệm Cảm Giác Đi Chùa Tại Nhà." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loading-content">
      <div class="lotus-spinner">
        <div class="petal" style="--i:0"></div>
        <div class="petal" style="--i:1"></div>
        <div class="petal" style="--i:2"></div>
        <div class="petal" style="--i:3"></div>
        <div class="petal" style="--i:4"></div>
        <div class="petal" style="--i:5"></div>
        <div class="petal" style="--i:6"></div>
        <div class="petal" style="--i:7"></div>
      </div>
      <h1 class="loading-title">🏯 Đi Chùa</h1>
      <p class="loading-sub">Developer: Tien Phat</p>
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <p class="loading-status" id="loading-status">Đang khởi tạo...</p>
    </div>
  </div>

  <!-- Game Canvas -->
  <canvas id="game-canvas"></canvas>

  <!-- HUD -->
  <div id="hud" class="hidden">
    <!-- Top Bar -->
    <div id="top-bar">
      <div id="location-info">
        <span class="loc-icon">⛩️</span>
        <span id="location-text">Sân Chùa</span>
      </div>
      <div id="fps-counter">60 FPS</div>
    </div>

    <!-- Pose Buttons -->
    <div id="pose-panel">
      <div class="pose-label">Tư Thế</div>
      <button class="pose-btn active" id="btn-pose-0" data-pose="0" title="Đứng Thường">
        <span class="pose-icon">🧍</span>
        <span class="pose-text">Đứng</span>
      </button>
      <button class="pose-btn" id="btn-pose-1" data-pose="1" title="Chắp Tay Cầu Nguyện">
        <span class="pose-icon">🙏</span>
        <span class="pose-text">Cầu Nguyện</span>
      </button>
      <button class="pose-btn" id="btn-pose-2" data-pose="2" title="Cầm Nhang Cầu Nguyện">
        <span class="pose-icon">🪔</span>
        <span class="pose-text">Dâng Nhang</span>
      </button>
      <button class="pose-btn" id="btn-pose-3" data-pose="3" title="Quỳ Lạy">
        <span class="pose-icon">🛐</span>
        <span class="pose-text">Quỳ Lạy</span>
      </button>
    </div>

    <!-- Joystick -->
    <div id="joystick-container">
      <div id="joystick-base">
        <div id="joystick-knob"></div>
      </div>
    </div>

    <!-- Camera Controls -->
    <div id="camera-controls">
      <button id="cam-zoom-in" class="cam-btn">+</button>
      <button id="cam-zoom-out" class="cam-btn">−</button>
    </div>

    <!-- Instructions -->
    <div id="instructions-hint" class="hint-popup">
      <p>👆 Kéo màn hình để xoay camera</p>
      <p>🕹️ Joystick để di chuyển</p>
      <p>🙏 Chọn tư thế để cầu nguyện</p>
    </div>
  </div>

  <!-- Three.js via CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/character.js"></script>
  <script src="js/environment.js"></script>
  <script src="js/particles.js"></script>
  <script src="js/controls.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
